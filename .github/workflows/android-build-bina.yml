name: Construir APK (Bina - Identificador de Chamadas)

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Apenas disparo manual

jobs:
  build_bina:
    name: Build Android APK (Bina)
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Código (Repositório Principal)
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Setup Java (Android SDK)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Scaffold App Bina Isola
      run: |
        mkdir -p bina-app/www
        cd bina-app
        cat << 'EOF' > www/index.html
        <!DOCTYPE html>
        <html>
        <head>
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <style>
            body { font-family: sans-serif; padding: 20px; background: #f0f0f0; }
            .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
            .icon { font-size: 48px; margin-bottom: 10px; }
            .status { margin-top: 20px; font-weight: bold; color: green; }
            #log { margin-top: 20px; font-size: 12px; color: #666; text-align: left; background: #eee; padding: 10px; border-radius: 8px; max-height: 200px; overflow-y: auto; }
          </style>
        </head>
        <body>
          <div class="card">
            <div class="icon">📞</div>
            <h2>GasFacil Bina</h2>
            <p>O identificador de chamadas está rodando em segundo plano.</p>
            <div class="status">✅ Ativo</div>
            <div id="log">Aguardando eventos...</div>
          </div>
          <script>
             window.addLog = function(msg) {
               const logEl = document.getElementById('log');
               logEl.innerHTML = new Date().toLocaleTimeString() + ': ' + msg + '<br>' + logEl.innerHTML;
             };
          </script>
        </body>
        </html>
        EOF
        
        npm init -y
        npm install @capacitor/core @capacitor/android @capacitor/cli
        
        npx cap init GasFacilBina app.gasfacil.bina --web-dir www
        npx cap add android
        
        # Disable cleartext traffic restriction just in case
        awk '/<application/ {print; print "        android:usesCleartextTraffic=\"true\""; next} 1' android/app/src/main/AndroidManifest.xml > temp.xml
        mv temp.xml android/app/src/main/AndroidManifest.xml

    - name: Generate Telephone Icon
      run: |
        cd bina-app
        npm install -g cordova-res
        mkdir -p resources
        cat << 'EOF' > resources/icon.svg
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
          <rect width="512" height="512" fill="#25D366"/>
          <path fill="white" d="M380.9 97.1C343.3 59.5 293.3 38.6 240.2 38.6 130 38.6 40.3 128.3 40.3 238.4c0 35.1 9.2 69.6 26.6 99.8L38.6 438l102.3-26.8c29.3 16.1 62.5 24.6 99.2 24.6h.1c110.1 0 199.9-89.8 199.9-199.9 0-53.4-20.8-103.6-59.2-142z"/>
          <path fill="#25D366" d="M240.2 396.1h-.1c-29.7 0-58.8-8-84.3-23.1l-6.1-3.6-62.7 16.5 16.8-61.2-3.9-6.3c-16.6-26.4-25.3-56.9-25.3-88.6 0-91.4 74.4-165.7 165.8-165.7 44.3 0 86 17.2 117.3 48.6 31.3 31.4 48.6 73 48.5 117.4 0 91.3-74.4 165.7-165.7 165.7z"/>
          <path fill="white" d="M331 275.2c-5-2.5-29.4-14.5-33.9-16.2-4.6-1.7-7.9-2.5-11.2 2.5-3.3 5-12.8 16.2-15.8 19.5-2.9 3.3-5.8 3.7-10.8 1.2-5-2.5-21-7.7-40-24.6-14.8-13.2-24.8-29.5-27.7-34.5-2.9-5-.3-7.7 2.2-10.2 2.2-2.2 5-5.8 7.5-8.7 2.5-2.9 3.3-5 5-8.3 1.7-3.3.8-6.2-.4-8.7-1.2-2.5-11.2-27.1-15.4-37.1-4.1-9.8-8.2-8.5-11.2-8.6-2.9-.1-6.2-.1-9.5-.1-3.3 0-8.7 1.2-13.3 6.2-4.6 5-17.9 17.5-17.9 42.6s18.3 49.5 20.8 52.8c2.5 3.3 36 54.9 87.2 77 12.2 5.3 21.7 8.5 29.1 10.8 12.2 3.9 23.3 3.3 32.1 2 9.8-1.5 29.4-12 33.6-23.6 4.2-11.6 4.2-21.6 2.9-23.6-1.2-2.5-4.5-3.7-9.5-6.2z"/>
        </svg>
        EOF
        npm install @capacitor/assets --save-dev
        npx capacitor-assets generate --android

    - name: Injetar Permissões no AndroidManifest.xml
      run: |
        cd bina-app/android/app/src/main
        
        PERMISSIONS="    <uses-permission android:name=\"android.permission.READ_PHONE_STATE\"/>\n    <uses-permission android:name=\"android.permission.READ_CALL_LOG\"/>\n    <uses-permission android:name=\"android.permission.RECEIVE_BOOT_COMPLETED\"/>\n    <uses-permission android:name=\"android.permission.FOREGROUND_SERVICE\"/>\n    <uses-permission android:name=\"android.permission.BIND_NOTIFICATION_LISTENER_SERVICE\"/>\n"
        awk -v perm="$PERMISSIONS" '/<application/ {print perm; print; next} 1' AndroidManifest.xml > temp.xml
        mv temp.xml AndroidManifest.xml
        
        RECEIVER="        <receiver android:name=\".CallReceiver\" android:exported=\"true\">\n            <intent-filter>\n                <action android:name=\"android.intent.action.PHONE_STATE\" />\n            </intent-filter>\n        </receiver>\n        <receiver android:name=\".BootReceiver\" android:exported=\"true\">\n            <intent-filter>\n                <action android:name=\"android.intent.action.BOOT_COMPLETED\" />\n            </intent-filter>\n        </receiver>\n        <service android:name=\".WhatsappListener\" android:label=\"Bina WhatsApp Listener\" android:permission=\"android.permission.BIND_NOTIFICATION_LISTENER_SERVICE\" android:exported=\"true\">\n            <intent-filter>\n                <action android:name=\"android.service.notification.NotificationListenerService\" />\n            </intent-filter>\n        </service>\n"
        awk -v rec="$RECEIVER" '/<\/application>/ {print rec; print; next} 1' AndroidManifest.xml > temp2.xml
        mv temp2.xml AndroidManifest.xml

    - name: Criar Códigos Nativos Kotlin (Bina Avançado)
      run: |
        mkdir -p bina-app/android/app/src/main/java/app/gasfacil/bina
        
        # WebhookUtils.kt (Lida com o webhook e envia a bateria)
        cat << 'EOF' > bina-app/android/app/src/main/java/app/gasfacil/bina/WebhookUtils.kt
        package app.gasfacil.bina
        import android.content.Context
        import android.os.BatteryManager
        import android.content.Intent
        import android.content.IntentFilter
        import android.util.Log
        import java.io.OutputStreamWriter
        import java.net.HttpURLConnection
        import java.net.URL
        
        object WebhookUtils {
            fun sendToWebhook(context: Context, phone: String, type: String) {
                Thread {
                    try {
                        val batteryStatus: Intent? = IntentFilter(Intent.ACTION_BATTERY_CHANGED).let { ifilter ->
                            context.registerReceiver(null, ifilter)
                        }
                        val batteryPct: Float? = batteryStatus?.let { intent ->
                            val level: Int = intent.getIntExtra(BatteryManager.EXTRA_LEVEL, -1)
                            val scale: Int = intent.getIntExtra(BatteryManager.EXTRA_SCALE, -1)
                            level * 100 / scale.toFloat()
                        }
                        val batteryStr = batteryPct?.toInt()?.toString() ?: "100"
        
                        val url = URL("https://scqenurznkatvrqxqjmt.supabase.co/functions/v1/bina-webhook")
                        val conn = url.openConnection() as HttpURLConnection
                        conn.requestMethod = "POST"
                        conn.setRequestProperty("Content-Type", "application/json; utf-8")
                        conn.setRequestProperty("Accept", "application/json")
                        conn.doOutput = true
                        
                        val jsonInputString = "{\"telefone\": \"$phone\", \"tipo\": \"$type\", \"bateria\": \"$batteryStr\"}"
                        
                        OutputStreamWriter(conn.outputStream).use { os ->
                            os.write(jsonInputString)
                        }
                        
                        val responseCode = conn.responseCode
                        Log.d("BinaWebhook", "POST Response: $responseCode - Data: $jsonInputString")
                        sendLogToUI(context, "Webhook status: $responseCode (tipo: $type)")
                    } catch (e: Exception) {
                        e.printStackTrace()
                        sendLogToUI(context, "Erro no webhook: ${e.message}")
                    }
                }.start()
            }
            
            fun sendLogToUI(context: Context, message: String) {
                try {
                     // In a real app we'd broadcast to the UI, 
                     // but for this scaffold Logcat is the main source of truth
                     Log.d("BinaUI", message)
                } catch(e: Exception){}
            }
        }
        EOF

        # CallReceiver.kt
        cat << 'EOF' > bina-app/android/app/src/main/java/app/gasfacil/bina/CallReceiver.kt
        package app.gasfacil.bina
        import android.content.BroadcastReceiver
        import android.content.Context
        import android.content.Intent
        import android.telephony.TelephonyManager
        
        class CallReceiver : BroadcastReceiver() {
            override fun onReceive(context: Context, intent: Intent) {
                if (intent.action == TelephonyManager.ACTION_PHONE_STATE_CHANGED) {
                    val state = intent.getStringExtra(TelephonyManager.EXTRA_STATE)
                    val number = intent.getStringExtra(TelephonyManager.EXTRA_INCOMING_NUMBER)
                    
                    if (state == TelephonyManager.EXTRA_STATE_RINGING && !number.isNullOrEmpty()) {
                        WebhookUtils.sendToWebhook(context, number, "celular")
                    }
                }
            }
        }
        EOF

        # BootReceiver.kt
        cat << 'EOF' > bina-app/android/app/src/main/java/app/gasfacil/bina/BootReceiver.kt
        package app.gasfacil.bina
        import android.content.BroadcastReceiver
        import android.content.Context
        import android.content.Intent
        import android.util.Log
        
        class BootReceiver : BroadcastReceiver() {
            override fun onReceive(context: Context, intent: Intent) {
                if (intent.action == Intent.ACTION_BOOT_COMPLETED) {
                    Log.d("BinaBoot", "App Bina Iniciado - AutoStart Concluido")
                    WebhookUtils.sendLogToUI(context, "Boot concluído - Iniciando monitoramento")
                }
            }
        }
        EOF

        # WhatsappListener.kt
        cat << 'EOF' > bina-app/android/app/src/main/java/app/gasfacil/bina/WhatsappListener.kt
        package app.gasfacil.bina
        import android.service.notification.NotificationListenerService
        import android.service.notification.StatusBarNotification
        import android.util.Log
        
        class WhatsappListener : NotificationListenerService() {
            override fun onNotificationPosted(sbn: StatusBarNotification) {
                val packageName = sbn.packageName
                if (packageName == "com.whatsapp" || packageName == "com.whatsapp.w4b") {
                    val extras = sbn.notification.extras
                    val title = extras.getString("android.title") ?: ""
                    val text = extras.getCharSequence("android.text")?.toString() ?: ""
                    
                    if (text.contains("Chamada", ignoreCase = true) || title.contains("Chamada", ignoreCase = true) || text.contains("Ligação", ignoreCase = true)) {
                        val contactName = title.replace("Chamada de voz recebida", "").replace("Chamada de vídeo recebida", "").replace("Ligação", "").trim()
                        if (contactName.isNotEmpty() && contactName != "WhatsApp") {
                            Log.d("BinaWhatsApp", "Chamada de WhatsApp detectada: $contactName")
                            WebhookUtils.sendToWebhook(applicationContext, contactName, "whatsapp")
                        }
                    }
                }
            }
        }
        EOF

        # MainActivity.java (Sobrescrever para pedir permissões na inicialização)
        cat << 'EOF' > bina-app/android/app/src/main/java/app/gasfacil/bina/MainActivity.java
        package app.gasfacil.bina;
        
        import android.Manifest;
        import android.content.Intent;
        import android.content.pm.PackageManager;
        import android.os.Bundle;
        import android.provider.Settings;
        import androidx.core.app.ActivityCompat;
        import androidx.core.content.ContextCompat;
        import com.getcapacitor.BridgeActivity;
        import android.widget.Toast;
        import android.webkit.WebView;
        import android.util.Log;
        
        public class MainActivity extends BridgeActivity {
            @Override
            public void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                
                String[] permissions = {
                    Manifest.permission.READ_PHONE_STATE,
                    Manifest.permission.READ_CALL_LOG
                };
                
                if (ContextCompat.checkSelfPermission(this, Manifest.permission.READ_PHONE_STATE) != PackageManager.PERMISSION_GRANTED ||
                    ContextCompat.checkSelfPermission(this, Manifest.permission.READ_CALL_LOG) != PackageManager.PERMISSION_GRANTED) {
                    ActivityCompat.requestPermissions(this, permissions, 1);
                } else {
                    Toast.makeText(this, "Permissões de Telefone OK", Toast.LENGTH_SHORT).show();
                }
                
                // Prompt User for Notification Service Access if not enabled
                String enabledListeners = Settings.Secure.getString(getContentResolver(), "enabled_notification_listeners");
                if (enabledListeners == null || !enabledListeners.contains(getPackageName())) {
                    Toast.makeText(this, "Atenção: Você precisa permitir o acesso às Notificações para ler o WhatsApp!", Toast.LENGTH_LONG).show();
                    Intent intent = new Intent(Settings.ACTION_NOTIFICATION_LISTENER_SETTINGS);
                    startActivity(intent);
                }
            }
            
            public void logToWebView(String message) {
               runOnUiThread(() -> {
                   if(bridge != null && bridge.getWebView() != null) {
                       bridge.getWebView().evaluateJavascript("window.addLog && window.addLog('"+message+"');", null);
                   }
               });
            }
        }
        EOF

    - name: Configurar Java 21 no build.gradle
      run: |
        cd bina-app/android/app
        # Força o target compatibility para Java 21
        sed -i 's/JavaVersion.VERSION_17/JavaVersion.VERSION_21/g' build.gradle
        sed -i 's/JavaVersion.VERSION_1_8/JavaVersion.VERSION_21/g' build.gradle

    - name: Compilar APK (Gradle)
      working-directory: bina-app/android
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug -Dorg.gradle.java.home=$JAVA_HOME

    - name: Disponibilizar o APK para Download
      uses: actions/upload-artifact@v4
      with:
        name: GasFacilPro_Bina.apk
        path: bina-app/android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
