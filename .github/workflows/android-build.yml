name: Construir APK (App do Entregador)

on:
  push:
    branches: [ main ]
  workflow_dispatch: # Permite rodar o build manualmente se quiser

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Código
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'
        cache: 'npm'

    - name: Setup Java (Android SDK)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Verificar Ambiente Java
      run: |
        java -version
        echo $JAVA_HOME

    - name: Instalar Dependências
      run: npm ci

    - name: Corrigir AGP Antigo no Plugin Background GPS
      run: sed -i "s/gradle:8.0.0/gradle:8.13.0/g" node_modules/@capacitor-community/background-geolocation/android/build.gradle

    - name: Fazer Build do Painel Web (Vite)
      run: npm run build

    - name: Sincronizar com Android (Capacitor)
      run: npx cap sync android

    - name: Compilar o APK (Gradle)
      working-directory: ./android
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug -Dorg.gradle.java.home=$JAVA_HOME

    - name: Disponibilizar o APK para Download
      uses: actions/upload-artifact@v4
      with:
        name: GasFacilPro_Entregador.apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 7
